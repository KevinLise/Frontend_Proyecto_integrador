<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JACKS-STOCK</title>
  <!-- Bootstrap 5 + estilos custom cargados por Vite desde src/js/main.js -->
  <link rel="icon" type="image/png" href="./src/assets/jack.png">
</head>

<body class="bg-light text-dark">

  <!-- LOGIN: se renderiza aquí cuando NO hay sesión -->
  <div id="root"></div>

  <!-- APP SHELL: sidebar + header + main. Oculto hasta autenticar. -->
  <div id="app-shell" class="d-none" style="height:100vh;overflow:hidden;">

    <!-- SIDEBAR -->
    <aside class="d-none d-md-flex flex-column bg-white border-end shrink-0"
           style="width:260px;min-width:260px;">

      <!-- Logo -->
      <div class="d-flex align-items-center gap-3 px-3 py-3 border-bottom">
        <img src="./src/assets/logo-emblem.png" alt="Jacks-Stock"
             class="rounded-3 object-fit-contain" style="width:40px;height:40px;">
        <div>
          <p class="fw-bold mb-0 lh-1"
             style="background:linear-gradient(90deg,#1e3a5f,#f97316);
                    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                    font-size:1rem;letter-spacing:.04em;">
            JACKS-STOCK
          </p>
          <p class="text-muted mb-0" style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;">
            Gestión de Inventarios
          </p>
        </div>
      </div>

      <!-- Nav links generados por router.js -->
      <nav id="sidebar-nav" class="flex-grow-1 px-2 py-3 overflow-auto">
        <!-- generado dinámicamente -->
      </nav>

      <!-- Usuario -->
      <div class="d-flex align-items-center gap-2 p-3 border-top">
        <div id="sidebar-avatar"
             class="rounded-circle bg-primary text-white d-flex align-items-center
                    justify-content-center fw-semibold flex-shrink-0"
             style="width:36px;height:36px;font-size:.75rem;">
          --
        </div>
        <div class="flex-grow-1 overflow-hidden lh-sm">
          <p id="sidebar-nombre" class="mb-0 fw-medium text-truncate" style="font-size:.875rem;">—</p>
          <p id="sidebar-rol"    class="mb-0 text-muted text-truncate" style="font-size:.75rem;">—</p>
        </div>
        <button id="btn-logout" title="Cerrar sesión"
                class="btn btn-link p-0 text-secondary ms-1"
                style="line-height:1;">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0
                     01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- CONTENT AREA -->
    <div class="d-flex flex-column flex-grow-1 overflow-auto">

      <!-- HEADER -->
      <header class="d-flex align-items-center justify-content-between gap-3 bg-white
                     border-bottom px-4 flex-shrink-0" style="height:72px;">

        <div class="position-relative flex-grow-1" style="max-width:420px;">
          <svg class="position-absolute text-secondary"
               style="left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;"
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
          </svg>
          <input type="text" placeholder="Buscar SKU, producto o categoría..."
                 class="form-control ps-5 rounded-pill border-secondary-subtle"
                 style="font-size:.875rem;">
        </div>

        <div class="d-flex align-items-center gap-3">
          <button id="btn-notificaciones"
                  class="btn btn-light rounded-circle position-relative p-0 d-flex
                         align-items-center justify-content-center"
                  style="width:36px;height:36px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2
                       a2 2 0 01-.6 1.4L4 17h5m6 0a3 3 0 11-6 0"/>
            </svg>
            <span class="position-absolute top-0 end-0 bg-warning rounded-circle"
                  style="width:8px;height:8px;"></span>
          </button>

          <div class="text-end d-none d-sm-block lh-sm">
            <p id="header-nombre" class="mb-0 fw-medium" style="font-size:.875rem;">—</p>
            <p id="header-rol"    class="mb-0 text-muted" style="font-size:.75rem;">—</p>
          </div>

          <div id="header-avatar"
               class="rounded-circle bg-dark text-white d-flex align-items-center
                      justify-content-center fw-semibold flex-shrink-0"
               style="width:36px;height:36px;font-size:.75rem;">
            --
          </div>
        </div>
      </header>

      <!-- Vista activa inyectada por router.js -->
      <main id="app" class="p-4">
        <!-- contenido dinámico -->
      </main>

    </div>
  </div>

  <!-- Entry point — Vite inyecta Bootstrap y el resto del JS -->
  <script type="module" src="./src/js/main.js"></script>
</body>

</html>
