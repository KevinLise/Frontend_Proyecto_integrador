<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JACKS-STOCK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./src/css/styles.css">
  <link rel="icon" type="image/png" href="./src/assets/jack.png">
</head>

<body class="bg-slate-100 text-slate-800">

  <!--
    #root: contenedor raíz.
    - Antes del login muestra la pantalla de login (full-screen).
    - Después del login es el <main> donde cada vista inyecta su HTML.
    Para el login lo usa login.js directamente.
    Para las vistas internas lo usa router.js (como #app antes).
  -->

  <!-- LOGIN: se renderiza aquí cuando NO hay sesión -->
  <div id="root"></div>

  <!-- APP SHELL: sidebar + header + main. Oculto hasta autenticar. -->
  <div id="app-shell" class="hidden flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex shrink-0">
      <div class="h-20 flex items-center gap-3 px-6 border-b border-slate-100">
        <img src="./src/assets/logo-emblem.png" alt="Jacks-Stock"
             class="w-10 h-10 rounded-xl object-contain">
        <div>
          <p class="font-bold text-lg leading-tight bg-gradient-to-r from-blue-900 to-orange-500
                    bg-clip-text text-transparent">
            JACKS-STOCK
          </p>
          <p class="text-[10px] uppercase tracking-wider text-slate-400 leading-tight">
            Gestión de Inventarios
          </p>
        </div>
      </div>

      <nav id="sidebar-nav" class="flex-1 px-3 py-5 space-y-1 text-sm">
        <p class="px-3 pb-2 text-[11px] uppercase tracking-wider text-slate-400 font-semibold">
          Operación
        </p>
        <!-- links generados por router.js -->
      </nav>

      <!-- Usuario en el sidebar -->
      <div class="p-4 border-t border-slate-100 flex items-center gap-3">
        <div id="sidebar-avatar"
             class="w-9 h-9 rounded-full bg-blue-900 text-white flex items-center
                    justify-center text-xs font-semibold">
          --
        </div>
        <div class="leading-tight flex-1 min-w-0">
          <p id="sidebar-nombre" class="text-sm font-medium text-slate-800 truncate">—</p>
          <p id="sidebar-rol"    class="text-xs text-slate-400 truncate">—</p>
        </div>
        <!-- Botón de cerrar sesión -->
        <button id="btn-logout"
                title="Cerrar sesión"
                class="text-slate-400 hover:text-red-500 transition shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7
                     a2 2 0 012-2h6a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- CONTENT AREA -->
    <div class="flex-1 flex flex-col overflow-y-auto">

      <!-- HEADER -->
      <header class="h-20 bg-white border-b border-slate-200 flex items-center
                     justify-between px-6 md:px-8 shrink-0 gap-4">
        <div class="relative flex-1 max-w-md">
          <svg class="w-4 h-4 absolute left-3.5 top-3 text-slate-400"
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
          </svg>
          <input type="text" placeholder="Buscar SKU, producto o categoría..."
                 class="w-full pl-10 pr-12 py-2.5 rounded-xl border border-slate-200
                        text-sm focus:outline-none focus:ring-2 focus:ring-slate-900/10">
        </div>
        <div class="flex items-center gap-4">
          <button id="btn-notificaciones"
                  class="relative w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center">
            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2
                       a2 2 0 01-.6 1.4L4 17h5m6 0a3 3 0 11-6 0"/>
            </svg>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-amber-500"></span>
          </button>
          <div class="text-right hidden sm:block">
            <p id="header-nombre" class="text-sm font-medium text-slate-800 leading-tight">—</p>
            <p id="header-rol"    class="text-xs text-slate-400 leading-tight">—</p>
          </div>
          <div id="header-avatar"
               class="w-9 h-9 rounded-full bg-slate-900 text-white flex items-center
                      justify-center text-xs font-semibold">
            --
          </div>
        </div>
      </header>

      <!-- Vista activa inyectada por router.js -->
      <main id="app" class="p-6 md:p-8">
        <!-- contenido dinámico -->
      </main>

    </div>
  </div>

  <script type="module" src="./src/js/main.js"></script>
</body>

</html>
